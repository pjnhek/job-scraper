name: CI

on:
  push:
    paths:
      - ".github/workflows/*.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "scraper/**/*.py"
      - "tests/**/*.py"
  pull_request:
    paths:
      - ".github/workflows/*.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "scraper/**/*.py"
      - "tests/**/*.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Run tests
        run: uv run pytest -v
