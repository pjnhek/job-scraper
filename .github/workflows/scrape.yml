name: Scrape Jobs
on:
  schedule:
    # 4x/day Mon-Fri Pacific: 8am=15 UTC, 11am=18 UTC, 2pm=21 UTC, 5pm=00 UTC next day
    - cron: "0 15 * * 1-5"
    - cron: "0 18 * * 1-5"
    - cron: "0 21 * * 1-5"
    - cron: "0 0  * * 2-6"
    # Sunday keepalive (prevents 60-day auto-disable of scheduled workflows)
    - cron: "0 12 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - name: Run scraper
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          HEARTBEAT: ${{ github.event.schedule == '0 15 * * 1-5' && 'true' || 'false' }}
          KEEPALIVE: ${{ github.event.schedule == '0 12 * * 0' && 'true' || 'false' }}
        run: uv run python -m scraper.main
      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen_jobs [skip ci]"
          # Keepalive: ensure a commit lands on Sunday even if nothing changed
          if [ "${{ github.event.schedule }}" = "0 12 * * 0" ] && git diff --staged --quiet; then
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .last_keepalive
            git add .last_keepalive
            git commit -m "chore: weekly keepalive [skip ci]"
          fi
          git push
